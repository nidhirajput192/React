<!--   DOM: Document Object Model

Introduction -----

DOM (Document Object Model) ek programming interface hai, jo
HTML document ko tree structure me represent karta hai. 
Is structure ke through JavaScript web page ke elements ko access,
 modify aur manipulate kar sakta hai.

structure of a DOM----
HTML document ko browser ek hierarchical tree me convert karta hai jisme har element ek node hota hai.

Example structure:
Document → html → body → elements (h1, p, div, etc.)


Types of Nodes------
Element Node – HTML tags jaise <div>, <p>, <h1>
Text Node – Element ke andar ka text
Attribute Node – id, class, style jaise attributes


DOM ka Use------
Web page ke content ko dynamically change karna
CSS styles modify karna
User events handle karna
New elements create aur delete karna


-->
